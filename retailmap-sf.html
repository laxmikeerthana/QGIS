<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailMap SF — Store Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #0D0F1C;
  color: #EEF0FF;
}

/* === TOKENS === */
:root {
  --bg:       #0D0F1C;
  --surface:  #13162A;
  --s2:       #1A1E35;
  --s3:       #22273D;
  --border:   #2A2F4A;
  --accent:   #FF5A35;
  --text:     #EEF0FF;
  --text2:    #7B819C;
  --text3:    #4A5070;
}

/* === LAYOUT === */
#rm-app {
  display: grid;
  grid-template-rows: 54px 1fr;
  height: 100vh;
}

/* === HEADER === */
#rm-header {
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
  flex-shrink: 0;
}

.rm-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  white-space: nowrap;
}
.rm-logo-accent { color: var(--accent); }
.rm-logo-city { color: var(--text2); font-weight: 400; }

.rm-hdivider {
  width: 1px; height: 28px;
  background: var(--border); flex-shrink: 0;
}

.rm-hstats {
  display: flex; align-items: center; gap: 20px; flex: 1;
}

.rm-hstat { display: flex; flex-direction: column; gap: 1px; }

.rm-hstat-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px; font-weight: 600;
  line-height: 1; color: var(--text);
}

.rm-hstat-lbl {
  font-size: 9px; font-weight: 500;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px;
}

.rm-hbadge {
  font-size: 10px; color: var(--text3);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; letter-spacing: 0.3px;
}

/* === BODY === */
#rm-body {
  display: grid;
  grid-template-columns: 280px 1fr;
  overflow: hidden; min-height: 0;
}

/* === SIDEBAR === */
#rm-sidebar {
  display: flex; flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow: hidden; min-height: 0;
}

#rm-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0;
}
#rm-scroll::-webkit-scrollbar { width: 3px; }
#rm-scroll::-webkit-scrollbar-track { background: transparent; }
#rm-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.rm-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.rm-sec-label {
  font-size: 9px; font-weight: 600;
  color: var(--text3); text-transform: uppercase;
  letter-spacing: 1.2px; margin-bottom: 10px;
}

/* Search */
.rm-search-wrap { position: relative; }

.rm-search-icon {
  position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); width: 14px; height: 14px;
  pointer-events: none;
}

#rm-search {
  width: 100%;
  padding: 8px 12px 8px 30px;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-size: 13px; font-family: inherit; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
#rm-search::placeholder { color: var(--text3); }
#rm-search:focus { border-color: var(--accent); background: var(--s3); }

.rm-search-hint {
  font-size: 11px; color: var(--text3);
  margin-top: 7px; min-height: 14px; line-height: 14px;
}

/* Layer Controls */
#rm-layers { display: flex; flex-direction: column; gap: 2px; }

.rm-layer-item {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 7px; border-radius: 6px;
  cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.rm-layer-item:hover { background: var(--s2); }

.rm-layer-check {
  width: 16px; height: 16px; border-radius: 4px;
  border: 2px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 9px; font-weight: 800;
  transition: background 0.15s;
}
.rm-layer-check.on { background: currentColor; }
.rm-layer-check.on::after { content: '✓'; color: var(--bg); }

.rm-layer-name {
  flex: 1; font-size: 12.5px; transition: color 0.15s, opacity 0.15s;
}
.rm-layer-item:not(.rm-off) .rm-layer-name { color: var(--text); }
.rm-layer-item.rm-off .rm-layer-name { color: var(--text3); text-decoration: line-through; }

.rm-layer-cnt {
  font-size: 10px; font-family: 'Space Grotesk', sans-serif;
  color: var(--text3); background: var(--s2);
  padding: 1px 7px; border-radius: 10px;
}

/* Charts */
.rm-chart-wrap { position: relative; margin-top: 6px; }
.rm-chart-bar { height: 150px; }
.rm-chart-donut { height: 130px; }

/* Selected Store */
#rm-sel-empty {
  font-size: 11px; color: var(--text3); padding: 2px 0;
}

#rm-sel-card {
  display: none;
  background: var(--s2); border-radius: 8px;
  padding: 12px; border: 1px solid var(--border);
}
#rm-sel-card.visible { display: block; }

.rm-sel-cat {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px;
}
.rm-sel-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text);
  line-height: 1.3; margin-bottom: 3px;
}
.rm-sel-addr { font-size: 11px; color: var(--text2); margin-bottom: 10px; }

.rm-sel-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.rm-sel-stat {
  background: var(--surface); border-radius: 5px;
  padding: 7px 6px; text-align: center;
  border: 1px solid var(--border);
}
.rm-sel-stat-v {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1; margin-bottom: 3px;
}
.rm-sel-stat-l {
  font-size: 8px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* === MAP === */
#rm-map-wrap { position: relative; min-height: 0; min-width: 0; }
#rm-map { width: 100%; height: 100%; }

/* Map overlay badge */
.rm-map-badge {
  position: absolute; top: 14px; right: 14px;
  z-index: 900; pointer-events: none;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
}
.rm-badge-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px; font-weight: 700; color: var(--text); line-height: 1;
}
.rm-badge-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* Leaflet overrides */
.leaflet-popup-content-wrapper {
  background: #fff !important;
  border-radius: 10px !important;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25) !important;
  padding: 0 !important;
  border: 1px solid #e5e7eb !important;
}
.leaflet-popup-content { margin: 0 !important; width: auto !important; }
.leaflet-popup-tip-container { display: none !important; }
.leaflet-control-attribution { display: none !important; }

.leaflet-control-zoom {
  border: none !important; box-shadow: none !important;
}
.leaflet-control-zoom-in,
.leaflet-control-zoom-out {
  background: var(--surface) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px !important;
  font-size: 16px !important;
  width: 30px !important; height: 30px !important;
  line-height: 28px !important;
}
.leaflet-control-zoom-in:hover,
.leaflet-control-zoom-out:hover { background: var(--s2) !important; }
.leaflet-control-zoom-in { margin-bottom: 3px !important; }

/* Marker hover */
.leaflet-marker-icon > div {
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.leaflet-marker-icon:hover > div {
  transform: scale(1.18) !important;
}

/* Popup inner */
.rm-popup {
  padding: 14px 16px;
  font-family: 'Inter', sans-serif;
  min-width: 200px;
}
.rm-popup-cat {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
}
.rm-popup-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 2px;
}
.rm-popup-addr { font-size: 11px; color: #6B7280; margin-bottom: 10px; }
.rm-popup-stats {
  display: flex; gap: 16px;
  border-top: 1px solid #F3F4F6; padding-top: 10px;
}
.rm-popup-stat { text-align: center; }
.rm-popup-sv {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 700; color: #111827; line-height: 1;
}
.rm-popup-sl {
  font-size: 8px; text-transform: uppercase;
  letter-spacing: 0.5px; color: #9CA3AF; margin-top: 2px;
}

/* Pulse animation for selected marker */
@keyframes rmPulse {
  0%   { box-shadow: 0 0 0 0 rgba(255, 90, 53, 0.5); }
  70%  { box-shadow: 0 0 0 10px rgba(255, 90, 53, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 90, 53, 0); }
}
.rm-marker-selected { animation: rmPulse 1.5s infinite; }
</style>
</head>
<body>
<div id="rm-app">

  <!-- HEADER -->
  <header id="rm-header">
    <div class="rm-logo">
      Retail<span class="rm-logo-accent">Map</span>&nbsp;<span class="rm-logo-city">SF</span>
    </div>
    <div class="rm-hdivider"></div>
    <div class="rm-hstats">
      <div class="rm-hstat">
        <div class="rm-hstat-val" id="h-total">28</div>
        <div class="rm-hstat-lbl">Total Stores</div>
      </div>
      <div class="rm-hstat">
        <div class="rm-hstat-val">6</div>
        <div class="rm-hstat-lbl">Categories</div>
      </div>
      <div class="rm-hstat">
        <div class="rm-hstat-val" id="h-rating">—</div>
        <div class="rm-hstat-lbl">Avg Rating</div>
      </div>
      <div class="rm-hstat">
        <div class="rm-hstat-val" id="h-emp">—</div>
        <div class="rm-hstat-lbl">Total Employees</div>
      </div>
    </div>
    <div class="rm-hbadge">San Francisco · 2024</div>
  </header>

  <!-- BODY -->
  <div id="rm-body">

    <!-- SIDEBAR -->
    <aside id="rm-sidebar">
      <div id="rm-scroll">

        <!-- Search -->
        <div class="rm-section">
          <div class="rm-sec-label">Store Finder</div>
          <div class="rm-search-wrap">
            <svg class="rm-search-icon" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
            </svg>
            <input type="text" id="rm-search" placeholder="Search stores…">
          </div>
          <div class="rm-search-hint" id="rm-hint"></div>
        </div>

        <!-- Layers -->
        <div class="rm-section">
          <div class="rm-sec-label">Map Layers</div>
          <div id="rm-layers"></div>
        </div>

        <!-- Bar Chart -->
        <div class="rm-section">
          <div class="rm-sec-label">Stores by Category</div>
          <div class="rm-chart-wrap rm-chart-bar">
            <canvas id="rm-bar"></canvas>
          </div>
        </div>

        <!-- Donut Chart -->
        <div class="rm-section">
          <div class="rm-sec-label">Rating Distribution</div>
          <div class="rm-chart-wrap rm-chart-donut">
            <canvas id="rm-donut"></canvas>
          </div>
        </div>

        <!-- Selected Store -->
        <div class="rm-section">
          <div class="rm-sec-label">Selected Store</div>
          <div id="rm-sel-empty">Click a marker on the map to view details.</div>
          <div id="rm-sel-card">
            <div class="rm-sel-cat" id="sel-cat"></div>
            <div class="rm-sel-name" id="sel-name"></div>
            <div class="rm-sel-addr" id="sel-addr"></div>
            <div class="rm-sel-grid">
              <div class="rm-sel-stat">
                <div class="rm-sel-stat-v" id="sel-rating"></div>
                <div class="rm-sel-stat-l">Rating</div>
              </div>
              <div class="rm-sel-stat">
                <div class="rm-sel-stat-v" id="sel-emp"></div>
                <div class="rm-sel-stat-l">Employees</div>
              </div>
              <div class="rm-sel-stat">
                <div class="rm-sel-stat-v" id="sel-sqft"></div>
                <div class="rm-sel-stat-l">Sq Ft</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </aside>

    <!-- MAP -->
    <div id="rm-map-wrap">
      <div id="rm-map"></div>
      <div class="rm-map-badge">
        <div class="rm-badge-val" id="rm-visible">28</div>
        <div class="rm-badge-lbl">Visible Stores</div>
      </div>
    </div>

  </div>
</div>

<script>
/* ────────────────────────────────
   DATA
──────────────────────────────── */
const CATS = {
  Grocery:     { color: '#4ECDC4', emoji: '🛒' },
  Electronics: { color: '#FF6B35', emoji: '💻' },
  Fashion:     { color: '#B57BFF', emoji: '👗' },
  Pharmacy:    { color: '#2DCC85', emoji: '💊' },
  Sports:      { color: '#FFC947', emoji: '🏃' },
  Home:        { color: '#FF6B9D', emoji: '🏠' },
};

const STORES = [
  // GROCERY
  { id:1,  name:'Whole Foods Market',              cat:'Grocery',     lat:37.7849, lng:-122.3994, addr:'399 4th St, SoMa',                   rating:4.2, emp:120, sqft:45000 },
  { id:2,  name:'Safeway Marina',                   cat:'Grocery',     lat:37.8030, lng:-122.4375, addr:'15 Marina Blvd, Marina',             rating:3.8, emp:95,  sqft:50000 },
  { id:3,  name:"Trader Joe's Fisherman's Wharf",  cat:'Grocery',     lat:37.7966, lng:-122.4053, addr:"401 Bay St, Fisherman's Wharf",      rating:4.5, emp:80,  sqft:12000 },
  { id:4,  name:'Rainbow Grocery Cooperative',      cat:'Grocery',     lat:37.7688, lng:-122.4138, addr:'1745 Folsom St, Mission',            rating:4.6, emp:55,  sqft:8000  },
  { id:5,  name:'Bi-Rite Market',                   cat:'Grocery',     lat:37.7625, lng:-122.4259, addr:'3639 18th St, Mission',              rating:4.7, emp:40,  sqft:3000  },
  { id:6,  name:"Gus's Community Market",           cat:'Grocery',     lat:37.7604, lng:-122.4348, addr:'4765 Mission St, Excelsior',         rating:4.3, emp:30,  sqft:5000  },
  // ELECTRONICS
  { id:7,  name:'Apple Store Union Square',         cat:'Electronics', lat:37.7880, lng:-122.4070, addr:'300 Post St, Union Square',          rating:4.3, emp:150, sqft:15000 },
  { id:8,  name:'Best Buy SoMa',                    cat:'Electronics', lat:37.7758, lng:-122.4171, addr:'1717 Harrison St, SoMa',             rating:3.9, emp:200, sqft:32000 },
  { id:9,  name:'B8ta SF',                          cat:'Electronics', lat:37.7731, lng:-122.4093, addr:'100 Howard St, Financial District',  rating:4.4, emp:45,  sqft:5000  },
  // FASHION
  { id:10, name:'Nordstrom SF',                     cat:'Fashion',     lat:37.7852, lng:-122.4056, addr:'865 Market St, Union Square',        rating:4.2, emp:300, sqft:240000},
  { id:11, name:'Zara Union Square',                cat:'Fashion',     lat:37.7869, lng:-122.4063, addr:'250 Post St, Union Square',          rating:3.7, emp:85,  sqft:18000 },
  { id:12, name:"Levi's Flagship Store",            cat:'Fashion',     lat:37.7883, lng:-122.4041, addr:'300 Mission St, SoMa',               rating:4.4, emp:50,  sqft:8000  },
  { id:13, name:'Patagonia',                        cat:'Fashion',     lat:37.7931, lng:-122.4031, addr:"770 North Point St, Fisherman's Wharf", rating:4.6, emp:45, sqft:6000 },
  { id:14, name:'Uniqlo Union Square',              cat:'Fashion',     lat:37.7862, lng:-122.4071, addr:'111 Powell St, Union Square',        rating:4.1, emp:90,  sqft:20000 },
  // PHARMACY
  { id:15, name:'Walgreens Castro',                 cat:'Pharmacy',    lat:37.7617, lng:-122.4349, addr:'498 Castro St, Castro',              rating:3.8, emp:35,  sqft:9000  },
  { id:16, name:'CVS Mission',                      cat:'Pharmacy',    lat:37.7637, lng:-122.4212, addr:'2950 Mission St, Mission',           rating:3.5, emp:30,  sqft:8000  },
  { id:17, name:'Walgreens Financial District',     cat:'Pharmacy',    lat:37.7919, lng:-122.3990, addr:'1 Market St, Financial District',    rating:3.6, emp:28,  sqft:7000  },
  { id:18, name:'Rite Aid Haight-Ashbury',          cat:'Pharmacy',    lat:37.7698, lng:-122.4471, addr:'1198 Haight St, Haight-Ashbury',     rating:3.3, emp:25,  sqft:6500  },
  // SPORTS
  { id:19, name:'REI Co-op SoMa',                   cat:'Sports',      lat:37.7694, lng:-122.4149, addr:'840 Brannan St, SoMa',               rating:4.5, emp:90,  sqft:22000 },
  { id:20, name:'Nike San Francisco',               cat:'Sports',      lat:37.7877, lng:-122.4067, addr:'278 Post St, Union Square',          rating:4.3, emp:65,  sqft:12000 },
  { id:21, name:'Sports Basement Presidio',         cat:'Sports',      lat:37.7982, lng:-122.4605, addr:'610 Mason St, Presidio',             rating:4.6, emp:120, sqft:78000 },
  { id:22, name:'Foot Locker Union Square',         cat:'Sports',      lat:37.7843, lng:-122.4066, addr:'865 Market St, Union Square',        rating:3.9, emp:35,  sqft:3500  },
  // HOME
  { id:23, name:'West Elm Hayes Valley',            cat:'Home',        lat:37.7760, lng:-122.4225, addr:'375 Hayes St, Hayes Valley',         rating:4.1, emp:55,  sqft:10000 },
  { id:24, name:'Crate & Barrel',                   cat:'Home',        lat:37.7883, lng:-122.4063, addr:'55 Stockton St, Union Square',       rating:4.2, emp:70,  sqft:22000 },
  { id:25, name:'Williams-Sonoma',                  cat:'Home',        lat:37.7885, lng:-122.4072, addr:'340 Post St, Union Square',          rating:4.3, emp:60,  sqft:8000  },
  { id:26, name:'Pottery Barn',                     cat:'Home',        lat:37.7884, lng:-122.4082, addr:'350 Post St, Union Square',          rating:4.2, emp:50,  sqft:9000  },
  { id:27, name:'CB2',                              cat:'Home',        lat:37.7782, lng:-122.4150, addr:'685 Market St, SoMa',                rating:4.0, emp:40,  sqft:7000  },
  { id:28, name:'Home Depot SoMa',                  cat:'Home',        lat:37.7634, lng:-122.3993, addr:'555 Bryant St, SoMa',                rating:3.7, emp:180, sqft:95000 },
];

/* ────────────────────────────────
   STATE
──────────────────────────────── */
const state = {
  layers:  Object.fromEntries(Object.keys(CATS).map(c => [c, true])),
  search:  '',
  markers: {},
  barChart: null,
  donutChart: null,
  selectedId: null,
};

/* ────────────────────────────────
   MAP
──────────────────────────────── */
const map = L.map('rm-map', {
  center: [37.775, -122.418],
  zoom: 13,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

window.addEventListener('resize', () => map.invalidateSize());

/* ────────────────────────────────
   MARKERS
──────────────────────────────── */
function makeIcon(cat, selected) {
  const { color, emoji } = CATS[cat];
  const pulse = selected ? 'animation:rmPulse 1.5s infinite;' : '';
  return L.divIcon({
    html: `<div style="
      width:34px;height:34px;background:${color};
      border-radius:50%;border:2.5px solid rgba(255,255,255,0.85);
      box-shadow:0 3px 12px rgba(0,0,0,0.5);
      display:flex;align-items:center;justify-content:center;
      font-size:15px;cursor:pointer;${pulse}
    ">${emoji}</div>`,
    className: '',
    iconSize: [34, 34],
    iconAnchor: [17, 17],
    popupAnchor: [0, -22],
  });
}

function makePopup(s) {
  const { color } = CATS[s.cat];
  return `
    <div class="rm-popup">
      <div class="rm-popup-cat" style="color:${color}">${s.cat}</div>
      <div class="rm-popup-name">${s.name}</div>
      <div class="rm-popup-addr">📍 ${s.addr}</div>
      <div class="rm-popup-stats">
        <div class="rm-popup-stat">
          <div class="rm-popup-sv">⭐ ${s.rating}</div>
          <div class="rm-popup-sl">Rating</div>
        </div>
        <div class="rm-popup-stat">
          <div class="rm-popup-sv">${s.emp}</div>
          <div class="rm-popup-sl">Employees</div>
        </div>
        <div class="rm-popup-stat">
          <div class="rm-popup-sv">${(s.sqft/1000).toFixed(0)}k</div>
          <div class="rm-popup-sl">Sq Ft</div>
        </div>
      </div>
    </div>`;
}

function initMarkers() {
  STORES.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: makeIcon(s.cat, false) })
      .bindPopup(makePopup(s), { maxWidth: 260, minWidth: 220, closeButton: false })
      .on('click', () => selectStore(s));
    state.markers[s.id] = m;
    m.addTo(map);
  });
}

/* ────────────────────────────────
   FILTER
──────────────────────────────── */
function applyFilters() {
  let visible = 0;
  STORES.forEach(s => {
    const m = state.markers[s.id];
    const show = state.layers[s.cat] &&
                 (!state.search || s.name.toLowerCase().includes(state.search));
    if (show) {
      if (!map.hasLayer(m)) m.addTo(map);
      visible++;
    } else {
      if (map.hasLayer(m)) m.removeFrom(map);
    }
  });
  document.getElementById('rm-visible').textContent = visible;
  document.getElementById('rm-hint').textContent =
    state.search ? `${visible} result${visible !== 1 ? 's' : ''} found` : '';
  updateBarChart();
}

/* ────────────────────────────────
   LAYERS
──────────────────────────────── */
function initLayers() {
  const container = document.getElementById('rm-layers');
  Object.entries(CATS).forEach(([cat, cfg]) => {
    const count = STORES.filter(s => s.cat === cat).length;
    const el = document.createElement('div');
    el.className = 'rm-layer-item';
    el.dataset.cat = cat;
    el.innerHTML = `
      <div class="rm-layer-check on" style="color:${cfg.color};border-color:${cfg.color}"></div>
      <span class="rm-layer-name">${cat}</span>
      <span class="rm-layer-cnt">${count}</span>`;
    el.addEventListener('click', () => {
      state.layers[cat] = !state.layers[cat];
      const chk = el.querySelector('.rm-layer-check');
      if (state.layers[cat]) {
        chk.classList.add('on');
        el.classList.remove('rm-off');
      } else {
        chk.classList.remove('on');
        el.classList.add('rm-off');
      }
      applyFilters();
    });
    container.appendChild(el);
  });
}

/* ────────────────────────────────
   SEARCH
──────────────────────────────── */
document.getElementById('rm-search').addEventListener('input', e => {
  state.search = e.target.value.trim().toLowerCase();
  applyFilters();
});

/* ────────────────────────────────
   SELECTED STORE
──────────────────────────────── */
function selectStore(s) {
  // reset previous selected marker icon
  if (state.selectedId && state.markers[state.selectedId]) {
    const prev = STORES.find(x => x.id === state.selectedId);
    if (prev) state.markers[prev.id].setIcon(makeIcon(prev.cat, false));
  }
  state.selectedId = s.id;
  state.markers[s.id].setIcon(makeIcon(s.cat, true));

  const { color } = CATS[s.cat];
  document.getElementById('rm-sel-empty').style.display = 'none';
  const card = document.getElementById('rm-sel-card');
  card.classList.add('visible');
  document.getElementById('sel-cat').textContent = s.cat;
  document.getElementById('sel-cat').style.color = color;
  document.getElementById('sel-name').textContent = s.name;
  document.getElementById('sel-addr').textContent = s.addr;
  document.getElementById('sel-rating').textContent = `⭐ ${s.rating}`;
  document.getElementById('sel-emp').textContent = s.emp.toLocaleString();
  document.getElementById('sel-sqft').textContent = `${(s.sqft/1000).toFixed(0)}k`;

  // smooth scroll sidebar to selected store section
  const scroll = document.getElementById('rm-scroll');
  scroll.scrollTo({ top: scroll.scrollHeight, behavior: 'smooth' });
}

/* ────────────────────────────────
   CHARTS
──────────────────────────────── */
function initCharts() {
  Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
  Chart.defaults.color = '#7B819C';

  // Bar chart
  const barCtx = document.getElementById('rm-bar').getContext('2d');
  state.barChart = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: Object.keys(CATS),
      datasets: [{
        data: Object.keys(CATS).map(c => STORES.filter(s => s.cat === c).length),
        backgroundColor: Object.values(CATS).map(c => c.color + 'BB'),
        borderColor:     Object.values(CATS).map(c => c.color),
        borderWidth: 1.5,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#13162A',
          borderColor: '#2A2F4A', borderWidth: 1,
          titleColor: '#EEF0FF', bodyColor: '#7B819C',
          callbacks: { label: ctx => ` ${ctx.raw} stores` }
        }
      },
      scales: {
        x: {
          grid: { color: '#2A2F4A44', drawBorder: false },
          ticks: { font: { size: 9 }, color: '#7B819C', maxRotation: 35 }
        },
        y: {
          grid: { color: '#2A2F4A44', drawBorder: false },
          ticks: { font: { size: 9 }, color: '#7B819C', stepSize: 2 },
          beginAtZero: true
        }
      },
      animation: { duration: 350 }
    }
  });

  // Donut chart
  const donutCtx = document.getElementById('rm-donut').getContext('2d');
  const bucketLabels = ['< 3.5', '3.5–4.0', '4.0–4.5', '> 4.5'];
  const bucketCounts = [
    STORES.filter(s => s.rating <  3.5).length,
    STORES.filter(s => s.rating >= 3.5 && s.rating < 4.0).length,
    STORES.filter(s => s.rating >= 4.0 && s.rating < 4.5).length,
    STORES.filter(s => s.rating >= 4.5).length,
  ];
  const bucketColors = ['#EF476F', '#FFD166', '#4ECDC4', '#06D6A0'];

  state.donutChart = new Chart(donutCtx, {
    type: 'doughnut',
    data: {
      labels: bucketLabels,
      datasets: [{
        data: bucketCounts,
        backgroundColor: bucketColors.map(c => c + '99'),
        borderColor: bucketColors,
        borderWidth: 1.5,
        hoverOffset: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: {
          position: 'right',
          labels: { font: { size: 9 }, boxWidth: 8, padding: 7, color: '#7B819C' }
        },
        tooltip: {
          backgroundColor: '#13162A',
          borderColor: '#2A2F4A', borderWidth: 1,
          titleColor: '#EEF0FF', bodyColor: '#7B819C',
          callbacks: { label: ctx => ` ${ctx.raw} stores` }
        }
      },
      animation: { duration: 350 }
    }
  });
}

function updateBarChart() {
  if (!state.barChart) return;
  state.barChart.data.datasets[0].data = Object.keys(CATS).map(c =>
    STORES.filter(s =>
      s.cat === c &&
      state.layers[c] &&
      (!state.search || s.name.toLowerCase().includes(state.search))
    ).length
  );
  state.barChart.update();
}

/* ────────────────────────────────
   HEADER STATS
──────────────────────────────── */
function initHeader() {
  const n = STORES.length;
  const avgRating = (STORES.reduce((a, s) => a + s.rating, 0) / n).toFixed(1);
  const totalEmp  = STORES.reduce((a, s) => a + s.emp, 0).toLocaleString();
  document.getElementById('h-total').textContent  = n;
  document.getElementById('h-rating').textContent = avgRating;
  document.getElementById('h-emp').textContent    = totalEmp;
}

/* ────────────────────────────────
   BOOT
──────────────────────────────── */
initMarkers();
initLayers();
initCharts();
initHeader();
</script>
</body>
</html>
